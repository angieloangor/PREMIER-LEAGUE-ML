<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PremierLeagueML hero poster</title>
  <desc id="desc">Dark cinematic poster with green and blue gradients for the dashboard hero video.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020407"/>
      <stop offset="55%" stop-color="#04080d"/>
      <stop offset="100%" stop-color="#070c12"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.8" r="0.8">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.82" cy="0.18" r="0.7">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="250" cy="700" r="360" fill="url(#glowA)" filter="url(#blur)"/>
  <circle cx="1290" cy="170" r="320" fill="url(#glowB)" filter="url(#blur)"/>
  <ellipse cx="800" cy="520" rx="420" ry="160" fill="#10b981" opacity=".05" filter="url(#blur)"/>

  <g opacity=".95">
    <path d="M200 680C420 590 610 560 800 560s380 30 600 120" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
    <path d="M250 730C460 650 640 620 800 620s340 30 540 110" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="1.5"/>
  </g>

  <g fill="#ffffff" fill-opacity=".08">
    <circle cx="420" cy="220" r="4"/>
    <circle cx="580" cy="300" r="3"/>
    <circle cx="1010" cy="260" r="4"/>
    <circle cx="1200" cy="540" r="3"/>
    <circle cx="700" cy="650" r="4"/>
  </g>

  <g transform="translate(110 120)">
    <text x="0" y="0" fill="#b8c7d9" fill-opacity=".7" font-family="Inter,Arial,sans-serif" font-size="22" letter-spacing="6">PREMIERLEAGUEML</text>
    <text x="0" y="110" fill="#ffffff" font-family="DM Serif Display, Georgia, serif" font-size="72" font-style="italic">Data to Goal</text>
    <text x="0" y="165" fill="#b8c7d9" fill-opacity=".65" font-family="Inter,Arial,sans-serif" font-size="24">Hero video poster for fast first paint</text>
  </g>

  <g transform="translate(1110 650)">
    <rect x="0" y="0" width="320" height="92" rx="20" fill="#ffffff" fill-opacity=".04" stroke="#ffffff" stroke-opacity=".06"/>
    <text x="28" y="38" fill="#10b981" font-family="JetBrains Mono, Consolas, monospace" font-size="18" letter-spacing="3">HERO</text>
    <text x="28" y="66" fill="#ffffff" fill-opacity=".72" font-family="Inter,Arial,sans-serif" font-size="20">Autoplay background ready</text>
  </g>
</svg>
