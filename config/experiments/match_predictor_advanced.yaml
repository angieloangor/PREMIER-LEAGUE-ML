experiment:
  name: advanced_match_predictor
  description: Two-pass workflow with stage1 feature generators and stage2 classifiers.

training:
  advance_modeling: true
  stage1_feature_set: history_only
  stage1_target_set: candidate_indices
  stage1_top_k: 3
  stage1_min_r2: 0.15
  include_all: false
  winner_feature_set: winner_default
  smote: true
  feature_modes:
    - normal
    - extra
    - lasso_selected
    - poly2_lasso
  search_iterations: 10

models:
  regressors:
    - linear_regression
    - knn_regressor
    - ridge_regressor
    - elasticnet_regressor
    - random_forest_regressor
    - xgboost_regressor
    - catboost_regressor
    - lightgbm_regressor
    - torch_regressor
  classifiers:
    - knn_classifier
    - ridge_classifier
    - elasticnet_classifier
    - random_forest_classifier
    - xgboost_classifier
    - catboost_classifier
    - lightgbm_classifier
    - torch_classifier
